<body>
    <h1 style="color: slategrey;">Remove whitespace from a sring</h1>
    <h2 style="color: rgb(197, 19, 146);">str.trimStart()</h2>
    <h2 style="color: seagreen;">str.trimEnd()</h2>
    <h2 style="color: steelblue;">str.trim()</h2>
    <script>
        var str=" Once upon a time there was a king. ";
        console.log(str.trimStart());          // Removes spaces at the beginning of string
        console.log(str.trimEnd());             // Removes spaces at the end of string
        console.log(str.trim());                // Removes spaces at both ends of string
    </script>
