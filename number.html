<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Datatype</title>
</head>
<body>
    <h1>Number Datatype</h1>
    <ol>
        <li>It is a primitive datatype</li>
        <li>They are Mutable</li>
        <li>They are object- dereferencing</li>
    </ol>
    <script>
        var a=10;
        var b=10.5;
        var c=1/0;
        var d=-1/0;
        console.log(a);
        console.log(b);
        console.log(c);
        console.log(d);
        console.log(typeof a);
        console.log(typeof b);  
    </script>
</body>
</html>
